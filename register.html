<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت نام | نواک </title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="login-page">

    <div class="login-container">

        <div class="logo-section">
            <i class="fas fa-book-open"></i>
            <h1>نواک</h1>
        </div>

        <h2>ثبت نام کاربر جدید</h2>
        <p id="errorMessage" style="color:red; font-size: 14px; text-align:center "></p>

        <form id="registerForm">
            <div class="input-group">
                <label for="username"> نام کاربری</label>
                <input 
                type="text" 
                id="username" 
                name="username"
                autocomplete="username"
                required>
            </div>

            <div class="input-group">
                <label for="email">ایمیل</label>
                <input 
                type="email" 
                id="email"
                name="email"
                autocomplete="email"
                 required>
            </div>

            <div class="input-group">
                <label for="password">(حداقل 6 کاراکتر)رمز عبور:</label>
                <input 
                type="password"
                 id="password"
                 name="password"
                 autocomplete="new-password"
                 minlength="6" 
                 required>
            </div>


            <!--تکرار رمز عبور-->
            <div class="input-group">
                <label for="confirmPassword">تکرار رمز عبور</label>
                <input 
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                autocomplete="new-password"
                minlength="6"
                required>
            </div>

            <button type="submit" class="btn">ثبت نام</button>
        </form>

        <p style="text-align:center ;margin-top: 15px;"> قبلاً ثبت‌نام کرده‌اید؟ <a href="index.html">وارد شوید</a></p>
    </div>

    <script src="register.js"></script>
</body>
</html>
