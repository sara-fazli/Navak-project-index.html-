<!DOCTYPE html>
<html lang="fa" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>سبد خرید</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="style.css">
        <style>
            body{
                font-family: 'Vazirmatn', sans-serif;
                background-color: #f4f4f9;
                padding:20px;
                margin:0;
            }
            .container{
                max-width: 900px;
                margin:auto;
            }
            h1{
                text-align: center;
                margin-bottom: 30px;
            }
            .cart-item{
                background: white;
                border-radius: 8px;
                padding:15px;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);

                display: flex;
                justify-content: space-between;
                align-items: center;
                flex-wrap: wrap;
            }

            .cart-info{
                flex:1;
            }

            .cart-actions{
                display:flex;
                gap:10px;
                align-items: center;
            }

            .btn{
                padding: 8px 12px ;
                border:none;
                border-radius: 5px;
                cursor:pointer;
            }

            .btn-add{
                background-color: #28a745;
                color:white;
            }

            .btn-remove{
                background-color: #dc3545;
                color:white;
            }

            .btn-decrease{
                background-color: #ffc107;
            }

            .summary{
                background: white;
                padding:20px;
                border-radius: 8px;
                margin-top: 25px;
                box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            }

            .summary h3{
                margin:10px 0;
            }

            .top-buttons{
                display: flex;
                justify-content: space-between;
                margin-bottom: 20px;
            }

            .empty-cart{
                text-align: center;
                font-size: 18px;
                margin-top: 50px;
            }
        </style>
    </head>

    <body>
        <div class="container">
            <div class="top-buttons">
                <a href="products.html" class="btn btn-add">
                    بازگشت به فروشگاه
                </a>
                <button  id="clearCartBtn" class="btn btn-remove">
                    خالی کردن سبد خرید
                </button>
            </div>
        
            <h1>سبد خرید نواک </h1>
            <div id="cart-items"></div>
             <div class="summary">
                <h3 id="ietmsCount">
                    تعداد کتاب ها:0
                </h3>
                <h3 id="cart-total">
                    مبلغ کل:0 توامن
                </h3>

                <a href="checkout.html" class="btn btn-add">
                    ثبت سفارش
                </a>

        </div>

    </div>

    <script src="cart.js"></script>

</body>

</html>
